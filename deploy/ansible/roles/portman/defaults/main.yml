---
# portman role defaults

# Installation
# portman_install_method: "github_release" (default) or "source"
portman_install_method: github_release

# GitHub release settings (install_method: github_release)
portman_github_repo: tjst-t/port-manager
# portman_version: v0.1.0  # Pin to a specific tag. Omit to use latest release.

# Direct URL override (skips GitHub API lookup)
# portman_binary_url: https://example.com/portman

# Source build settings (install_method: source)
# portman_repo_url: https://github.com/tjst-t/port-manager.git
# portman_source_version: main

# General
portman_db_path: /var/lib/portman/portman.db

# Port range
portman_port_range_start: 8200
portman_port_range_end: 8999
portman_stale_ttl_hours: 24

# Proxy
portman_proxy_type: caddy
portman_caddy_api: "http://localhost:2019"
portman_domain_suffix: example.com
portman_host_pattern: "{name}--{worktree}--{repo}"

# Dashboard
portman_dashboard_enabled: true
portman_dashboard_host: "portal.example.com"
portman_dashboard_output_dir: /var/lib/portman/portal
portman_dashboard_auto_update: true
portman_dashboard_serve_addr: ":8080"

# GC
portman_gc_interval: hourly

# Services (reserved ports and permanent services)
portman_services:
  reserved:
    - port: 80
      description: caddy http
    - port: 443
      description: caddy https
    - port: 2019
      description: caddy admin api
  permanent: []
