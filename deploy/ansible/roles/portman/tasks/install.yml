---
- name: Download portman binary
  ansible.builtin.get_url:
    url: "{{ portman_binary_url }}"
    dest: /usr/local/bin/portman
    mode: '0755'
  when: portman_binary_url is defined

- name: Build portman from source
  when: portman_binary_url is not defined
  block:
    - name: Clone repository
      ansible.builtin.git:
        repo: "{{ portman_repo_url | default('https://github.com/tjst-t/port-manager.git') }}"
        dest: /tmp/port-manager
        version: "{{ portman_version | default('main') }}"

    - name: Get version from git tag
      ansible.builtin.command:
        cmd: git describe --tags --always --dirty
        chdir: /tmp/port-manager
      register: portman_git_version
      changed_when: false

    - name: Build binary
      ansible.builtin.command:
        cmd: >-
          go build
          -ldflags "-s -w -X github.com/tjst-t/port-manager/cmd.Version={{ portman_git_version.stdout }}"
          -o /usr/local/bin/portman .
        chdir: /tmp/port-manager
      changed_when: true

    - name: Clean up source
      ansible.builtin.file:
        path: /tmp/port-manager
        state: absent
