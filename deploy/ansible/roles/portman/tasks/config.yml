---
- name: Create portman config directory
  ansible.builtin.file:
    path: /etc/portman
    state: directory
    mode: '0755'

- name: Create portman data directory
  ansible.builtin.file:
    path: /var/lib/portman
    state: directory
    mode: '0755'

- name: Create portal output directory
  ansible.builtin.file:
    path: "{{ portman_dashboard_output_dir | default('/var/lib/portman/portal') }}"
    state: directory
    mode: '0755'
  when: portman_dashboard_enabled | default(true)

- name: Deploy config.toml
  ansible.builtin.template:
    src: config.toml.j2
    dest: /etc/portman/config.toml
    mode: '0644'

- name: Deploy services.json
  ansible.builtin.template:
    src: services.json.j2
    dest: /etc/portman/services.json
    mode: '0644'
